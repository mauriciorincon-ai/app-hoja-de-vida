# Apps del pipeline AI-APPs en el showcase — "solo lo real": sin fechas prometidas.
# Agregar/editar una card = editar este archivo + push (cero cambios de código).
# Estados válidos (content pack §9 — estados honestos):
#   en-produccion   → URL viva + repo público + CI verde ("esto ya lo hace")
#   en-construccion → repo público con commits reales ("esto lo está haciendo AHORA")
#   en-exploracion  → objetivo declarado, sin fechas prometidas ("esto viene")
#
# roadmap: (S4) — features futuras votables por los visitantes. El par
#   (id de la app, id de la feature) es la clave del voto en la BD; cambiar el
#   id de una feature reinicia su conteo. Vacío/ausente = la app no aparece en
#   la sección de votación. Cada feature necesita titulo y descripcion ES+EN.

apps:
  - id: hoja-de-vida
    estado: en-produccion
    nombre:
      es: "CV Viva"
      en: "Living CV"
    descripcion:
      es: "Esta misma página: Next.js 16 + SSG + motion system + CI con gates de calidad. El repo es público — lo que estás viendo es el demo."
      en: "This very page: Next.js 16 + SSG + a motion system + CI with quality gates. The repo is public — what you're looking at is the demo."
    enlaces:
      - etiqueta: "GitHub"
        url: "https://github.com/mauriciorincon-ai/app-hoja-de-vida"
    solicitable: false
    brochure:
      tagline:
        es: "Una hoja de vida que se construye a sí misma, en público."
        en: "A résumé that builds itself, in the open."
      intro:
        es: "No es un PDF ni una plantilla: es una app Next.js desplegada en Vercel, con el mismo contenido sirviendo a la web, al chat y al PDF ATS desde una sola fuente de datos versionada. Lo que estás leyendo es el demo de sí misma."
        en: "It's not a PDF or a template: it's a Next.js app deployed on Vercel, with the same content feeding the web, the chat and the ATS PDF from a single versioned data source. What you're reading is its own demo."
      funcionalidades:
        - titulo:
            es: "Contenido = datos versionados"
            en: "Content = versioned data"
          descripcion:
            es: "Toda la CV vive en YAML validado con Zod en build: editar el archivo + push actualiza web, PDF y chat a la vez. Si el contenido está malformado, el build falla."
            en: "The whole CV lives in Zod-validated YAML at build time: editing the file + push updates the web, PDF and chat at once. If the content is malformed, the build fails."
        - titulo:
            es: "Experiencia editorial animada"
            en: "Animated editorial experience"
          descripcion:
            es: "Un motion system propio (Reveal, Stagger, Counter, TimelineTrack) con reduced-motion a prueba de hidratación y presupuesto de performance vigilado por Lighthouse en CI."
            en: "A custom motion system (Reveal, Stagger, Counter, TimelineTrack) with hydration-safe reduced-motion and a performance budget watched by Lighthouse in CI."
        - titulo:
            es: "SSG primero, para ATS y SEO"
            en: "SSG-first, for ATS and SEO"
          descripcion:
            es: "Todo el contenido está en el HTML estático: un recruiter, un bot ATS o un curl sin JavaScript ven la hoja de vida entera, con JSON-LD y hreflang."
            en: "All content is in the static HTML: a recruiter, an ATS bot or a curl without JavaScript see the whole résumé, with JSON-LD and hreflang."
        - titulo:
            es: "Roadmap votable por quien la visita"
            en: "A roadmap the visitor votes on"
          descripcion:
            es: "Las próximas features se votan con un clic, sin registro, y el contador es real (Supabase con RPC atómico). Si la base de datos cae, lo dice — nunca inventa un número."
            en: "Upcoming features are voted with one click, no sign-up, and the counter is real (Supabase with an atomic RPC). If the database goes down, it says so — it never fabricates a number."
      metricas:
        - valor: 2
          etiqueta:
            es: "idiomas, misma fuente"
            en: "languages, one source"
        - valor: 0
          sufijo: " US$/mes"
          etiqueta:
            es: "todo en free tier"
            en: "all on free tier"
        - valor: 100
          sufijo: "%"
          etiqueta:
            es: "contenido en HTML estático"
            en: "content in static HTML"
      stack:
        - "Next.js 16"
        - "TypeScript"
        - "Tailwind"
        - "Supabase"
        - "Playwright"
        - "Vercel"
    roadmap:
      - id: mapa-c4
        titulo:
          es: "Mapa de arquitectura interactivo (C4)"
          en: "Interactive architecture map (C4)"
        descripcion:
          es: "Navegar mis sistemas por niveles de zoom, del contexto al detalle, como un mapa."
          en: "Navigate my systems by zoom levels, from context to detail, like a map."
      - id: maquina-del-tiempo
        titulo:
          es: "Máquina del tiempo completa"
          en: "Full time machine"
        descripcion:
          es: "Un scrubber cronológico para recorrer la evolución de cada proyecto en el tiempo."
          en: "A chronological scrubber to walk through each project's evolution over time."
      - id: sello-verificacion
        titulo:
          es: "Sello de verificación criptográfica"
          en: "Cryptographic verification seal"
        descripcion:
          es: "Logros y commits con prueba verificable, para la era del candidato falso."
          en: "Achievements and commits with verifiable proof, for the age of the fake candidate."
      - id: selector-audiencia
        titulo:
          es: "Selector de audiencia"
          en: "Audience selector"
        descripcion:
          es: "El mismo contenido en modo ejecutivo o modo arquitecto, a tu elección."
          en: "The same content in executive mode or architect mode, your choice."
      - id: pwa-offline
        titulo:
          es: "Versión instalable offline (PWA)"
          en: "Installable offline version (PWA)"
        descripcion:
          es: "Instalar la CV Viva como app y consultarla sin conexión."
          en: "Install the Living CV as an app and browse it offline."

  - id: chat-hoja-de-vida
    estado: en-produccion
    nombre:
      es: "Chat con mi hoja de vida"
      en: "Chat with my résumé"
    descripcion:
      es: "Ya está vivo en esta página (botón flotante): RAG con índice en build-time, citas navegables, proveedor LLM conmutable por env (Groq · Gemini · Azure AI Foundry · Claude) y fallback local — nunca se cae (AI-102 en acción)."
      en: "Live on this very page (floating button): RAG with a build-time index, navigable citations, an env-switchable LLM provider (Groq · Gemini · Azure AI Foundry · Claude) and a local fallback — it never goes down (AI-102 in action)."
    enlaces:
      - etiqueta: "GitHub"
        url: "https://github.com/mauriciorincon-ai/app-hoja-de-vida"
    solicitable: false
    brochure:
      tagline:
        es: "Un chat que responde por mi hoja de vida — y nunca se cae."
        en: "A chat that answers for my résumé — and never goes down."
      intro:
        es: "Pregúntale por mi experiencia en español o inglés y responde solo con mi contenido real, citando la fuente y enlazándola. Si el proveedor de IA no está disponible, degrada a búsqueda local sobre el mismo índice: el chat sigue funcionando."
        en: "Ask it about my experience in Spanish or English and it answers using only my real content, citing the source and linking it. If the AI provider is unavailable, it falls back to local search over the same index: the chat keeps working."
      funcionalidades:
        - titulo:
            es: "Respuestas ancladas a la fuente"
            en: "Answers grounded in the source"
          descripcion:
            es: "RAG con índice construido en build-time desde el contenido real; cada respuesta cita la sección o el case study y enlaza a él. Sin alucinaciones sobre experiencia que no existe."
            en: "RAG with a build-time index from the real content; every answer cites the section or case study and links to it. No hallucinating experience that doesn't exist."
        - titulo:
            es: "Proveedor LLM conmutable por env"
            en: "Env-switchable LLM provider"
          descripcion:
            es: "Groq, Gemini, Azure AI Foundry, Claude o un self-host OpenAI-compatible: cambiar de proveedor es cambiar una variable de entorno, cero código. La demostración viva del AI-102."
            en: "Groq, Gemini, Azure AI Foundry, Claude or an OpenAI-compatible self-host: switching provider is switching an environment variable, zero code. The AI-102 shown live."
        - titulo:
            es: "Nunca se cae: fallback local"
            en: "Never down: local fallback"
          descripcion:
            es: "Un circuit breaker degrada a búsqueda instantánea en el cliente cuando el proveedor falla. La primera vez que ocurrió fue una falla real de credencial — y funcionó."
            en: "A circuit breaker degrades to instant client-side search when the provider fails. The first time it happened was a real credential failure — and it worked."
        - titulo:
            es: "Guardrails y presupuesto"
            en: "Guardrails and budget"
          descripcion:
            es: "Las preguntas fuera de tema se responden sin gastar un token; rate limit por IP, techo de tokens y kill-switch. Nada de lo que produce el modelo se guarda."
            en: "Off-topic questions are answered without spending a token; rate limit per IP, token ceiling and kill-switch. Nothing the model produces is stored."
      metricas:
        - valor: 6
          etiqueta:
            es: "proveedores conmutables"
            en: "switchable providers"
        - valor: 0
          etiqueta:
            es: "respuestas persistidas"
            en: "persisted answers"
      stack:
        - "Vercel AI SDK"
        - "Groq"
        - "MiniSearch"
        - "Zod"
        - "TypeScript"
    roadmap:
      - id: embeddings-retrieval
        titulo:
          es: "Retrieval con embeddings"
          en: "Embeddings-based retrieval"
        descripcion:
          es: "Búsqueda semántica en el índice del chat, más allá del match léxico actual."
          en: "Semantic search over the chat index, beyond the current lexical match."
      - id: memoria-conversacion
        titulo:
          es: "Memoria de la conversación"
          en: "Conversation memory"
        descripcion:
          es: "Que el chat recuerde el hilo de la charla para preguntas de seguimiento."
          en: "Let the chat remember the thread so you can ask follow-up questions."

  - id: fabric-analitica-e2e
    estado: en-exploracion
    nombre:
      es: "Analítica end-to-end en Fabric"
      en: "End-to-end analytics on Fabric"
    descripcion:
      es: "Pipeline público con datos abiertos de Colombia: ingesta → Lakehouse → modelo semántico → Power BI embebido. Ingeniería de analítica verificable (DP-600)."
      en: "A public pipeline on Colombian open data: ingestion → Lakehouse → semantic model → embedded Power BI. Verifiable analytics engineering (DP-600)."
    solicitable: true

  - id: agente-gemini-vertex
    estado: en-exploracion
    nombre:
      es: "Agente autónomo con Gemini + Vertex AI"
      en: "Autonomous agent with Gemini + Vertex AI"
    descripcion:
      es: "Agente con herramientas (LangChain) sobre el stack de GCP: el complemento multi-cloud de mi certificación Azure."
      en: "A tool-using agent (LangChain) on the GCP stack: the multi-cloud complement to my Azure certification."
    solicitable: true
