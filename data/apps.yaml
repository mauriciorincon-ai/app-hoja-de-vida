# Apps del pipeline AI-APPs en el showcase — "solo lo real": sin fechas prometidas.
# Agregar/editar una card = editar este archivo + push (cero cambios de código).
# Estados válidos (content pack §9 — estados honestos):
#   en-produccion   → URL viva + repo público + CI verde ("esto ya lo hace")
#   en-construccion → repo público con commits reales ("esto lo está haciendo AHORA")
#   en-exploracion  → objetivo declarado, sin fechas prometidas ("esto viene")
#
# roadmap: (S4) — features futuras votables por los visitantes. El par
#   (id de la app, id de la feature) es la clave del voto en la BD; cambiar el
#   id de una feature reinicia su conteo. Vacío/ausente = la app no aparece en
#   la sección de votación. Cada feature necesita titulo y descripcion ES+EN.

apps:
  - id: hoja-de-vida
    estado: en-produccion
    nombre:
      es: "CV Viva"
      en: "Living CV"
    descripcion:
      es: "Esta misma página: Next.js 16 + SSG + motion system + CI con gates de calidad. El repo es público — lo que estás viendo es el demo."
      en: "This very page: Next.js 16 + SSG + a motion system + CI with quality gates. The repo is public — what you're looking at is the demo."
    enlaces:
      - etiqueta: "GitHub"
        url: "https://github.com/mauriciorincon-ai/app-hoja-de-vida"
    solicitable: false
    roadmap:
      - id: mapa-c4
        titulo:
          es: "Mapa de arquitectura interactivo (C4)"
          en: "Interactive architecture map (C4)"
        descripcion:
          es: "Navegar mis sistemas por niveles de zoom, del contexto al detalle, como un mapa."
          en: "Navigate my systems by zoom levels, from context to detail, like a map."
      - id: maquina-del-tiempo
        titulo:
          es: "Máquina del tiempo completa"
          en: "Full time machine"
        descripcion:
          es: "Un scrubber cronológico para recorrer la evolución de cada proyecto en el tiempo."
          en: "A chronological scrubber to walk through each project's evolution over time."
      - id: sello-verificacion
        titulo:
          es: "Sello de verificación criptográfica"
          en: "Cryptographic verification seal"
        descripcion:
          es: "Logros y commits con prueba verificable, para la era del candidato falso."
          en: "Achievements and commits with verifiable proof, for the age of the fake candidate."
      - id: selector-audiencia
        titulo:
          es: "Selector de audiencia"
          en: "Audience selector"
        descripcion:
          es: "El mismo contenido en modo ejecutivo o modo arquitecto, a tu elección."
          en: "The same content in executive mode or architect mode, your choice."
      - id: pwa-offline
        titulo:
          es: "Versión instalable offline (PWA)"
          en: "Installable offline version (PWA)"
        descripcion:
          es: "Instalar la CV Viva como app y consultarla sin conexión."
          en: "Install the Living CV as an app and browse it offline."

  - id: chat-hoja-de-vida
    estado: en-produccion
    nombre:
      es: "Chat con mi hoja de vida"
      en: "Chat with my résumé"
    descripcion:
      es: "Ya está vivo en esta página (botón flotante): RAG con índice en build-time, citas navegables, proveedor LLM conmutable por env (Groq · Gemini · Azure AI Foundry · Claude) y fallback local — nunca se cae (AI-102 en acción)."
      en: "Live on this very page (floating button): RAG with a build-time index, navigable citations, an env-switchable LLM provider (Groq · Gemini · Azure AI Foundry · Claude) and a local fallback — it never goes down (AI-102 in action)."
    enlaces:
      - etiqueta: "GitHub"
        url: "https://github.com/mauriciorincon-ai/app-hoja-de-vida"
    solicitable: false
    roadmap:
      - id: embeddings-retrieval
        titulo:
          es: "Retrieval con embeddings"
          en: "Embeddings-based retrieval"
        descripcion:
          es: "Búsqueda semántica en el índice del chat, más allá del match léxico actual."
          en: "Semantic search over the chat index, beyond the current lexical match."
      - id: memoria-conversacion
        titulo:
          es: "Memoria de la conversación"
          en: "Conversation memory"
        descripcion:
          es: "Que el chat recuerde el hilo de la charla para preguntas de seguimiento."
          en: "Let the chat remember the thread so you can ask follow-up questions."

  - id: fabric-analitica-e2e
    estado: en-exploracion
    nombre:
      es: "Analítica end-to-end en Fabric"
      en: "End-to-end analytics on Fabric"
    descripcion:
      es: "Pipeline público con datos abiertos de Colombia: ingesta → Lakehouse → modelo semántico → Power BI embebido. Ingeniería de analítica verificable (DP-600)."
      en: "A public pipeline on Colombian open data: ingestion → Lakehouse → semantic model → embedded Power BI. Verifiable analytics engineering (DP-600)."
    solicitable: true

  - id: agente-gemini-vertex
    estado: en-exploracion
    nombre:
      es: "Agente autónomo con Gemini + Vertex AI"
      en: "Autonomous agent with Gemini + Vertex AI"
    descripcion:
      es: "Agente con herramientas (LangChain) sobre el stack de GCP: el complemento multi-cloud de mi certificación Azure."
      en: "A tool-using agent (LangChain) on the GCP stack: the multi-cloud complement to my Azure certification."
    solicitable: true
