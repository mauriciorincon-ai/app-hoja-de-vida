      subió la productividad 20%.
    stack: ["BI", "ETL", "scikit-learn"]
  - nombre: "Datos que mueven una ciudad — TransMilenio / C&M (2021–2022)"
    resumen: >-
      Adopción de BI (+35% de eficiencia, 25+ usuarios clave), ETL que unificó
