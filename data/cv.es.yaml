identidad:
  nombre: "Henry Rincón"
  nombreCompleto: "Henry Mauricio Rincón Caro"
  eyebrow: "Ingeniero Industrial · Data & AI Engineer"
  titular: "De la ingeniería industrial a los agentes de IA: datos, plataformas y decisiones."
  resumen: >-
    Líder de datos e ingeniero de IA (DP-600 · AI-102). Diseño plataformas
    analíticas en Microsoft Fabric y llevo agentes de IA a producción — con la
    evidencia pública para probarlo.
  # La frase del chat del pack §3 se restituye en S3, cuando el chat exista
  perfil: >-
    Ingeniero Industrial (Javeriana) con 8+ años convirtiendo datos operativos
    en decisiones de negocio: BI adoptado por 50+ usuarios en banca, ETL que
    recortó tiempos de análisis hasta 70%, y modelos predictivos en producción
    con >90% de precisión. En 2023 di el salto natural: lideré la estrategia de
    datos de una startup de agentes de IA, construyendo desde cero su
    ecosistema en Microsoft Fabric y el proceso replicable para diseñar y
    monitorear agentes. Certificado por Microsoft en ingeniería de analítica
    (DP-600) e ingeniería de IA (AI-102).
  # La disponibilidad de reubicación es señal DELIBERADA para recruiters (pack §1)
  ubicacion: "Bogotá, Colombia · Abierto a reubicación internacional y trabajo remoto"
  email: "mauricio.hmrc@gmail.com"
  enlaces:
    - etiqueta: "LinkedIn"
      url: "https://www.linkedin.com/in/henry-mauricio-rincon"
    - etiqueta: "GitHub"
      url: "https://github.com/mauriciorincon-ai"

