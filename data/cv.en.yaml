proyectos:
  - slug: "vesting"
    nombre: "A data platform for AI agents — Vesting (2023–2025)"
    resumen: >-
      An automation-agents startup with no data infrastructure: I designed and
      built from scratch its Microsoft Fabric ecosystem (big data + data
      warehouse + distributed processing), the governance to integrate client
      and system data, real-time agent monitoring, and the replicable core
      process to design and ship AI agents. The exact bridge between DP-600
      and AI-102.
    stack: ["Microsoft Fabric", "Data governance", "Real-time monitoring"]
    destacado: true
    casestudy:
      contexto: >-
        Vesting, an automation-agents startup, was growing without data
        infrastructure: its AI-agent analytics had nowhere to live and every
        client data integration was handcrafted.
      reto: >-
        Build from scratch a data ecosystem able to support AI-agent analytics
        and monitoring in production — with governance from day one and
        without slowing the startup down.
      acciones:
        - "Designed the ecosystem architecture on Microsoft Fabric: big data, data warehouse and distributed processing."
        - "Defined the data governance to integrate client and system data consistently."
        - "Built real-time monitoring for the AI agents in production."
        - "Documented the replicable core process to design and implement AI agents."
      impacto:
        - "The startup's data ecosystem became operational from scratch on Microsoft Fabric."
        - "Agents in production went from opaque to monitored in real time."
        - "The replicable core process standardized how agents are designed and shipped."
        - "The exact bridge between analytics engineering (DP-600) and AI engineering (AI-102)."
  - slug: "banco-pichincha"
